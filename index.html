<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>BrawlTrack</title>
    
    <meta name="description" content="BrawlTrack est le meilleur outil pour suivre l'historique et les statistiques de tes brawlers sur Brawl Stars. Recherche ton tag et analyse ta progression !">
    
    <link rel="icon" type="image/png" href="assets/logo.png">
    
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Lilita+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<body>
    <div id="global-navbar"></div>
    <div style="text-align: center; margin-top: 40px;">
        <h1 style="font-size: 3em; margin-bottom: 10px; text-shadow: 0 5px 15px rgba(0,0,0,0.5);">BRAWL TRACK</h1>
        <p style="color: #888;">Suivi de statistiques & Historique</p>
    </div>

    <div class="landing-wrapper">

        <div class="landing-column">
            
            <div style="margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 25px;">
                <h3 style="margin-top: 0; color: #fff; font-size: 1.5em;">
                    <img src="/assets/icons/achievements_feature.png" alt="" style="height: 1.2em; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'">Recherche Rapide
                </h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="public-tag" placeholder="#TAG du joueur">
                    <button onclick="publicSearch()" class="btn-3d btn-yellow btn-adp">Go</button>
                </div>
            </div>

            <div id="login-form">
                <h2 style="color: #ffce00;">Connexion</h2>
                <input type="text" id="login-username" placeholder="Nom d'utilisateur">
                <input type="password" id="login-password" placeholder="Mot de passe" onkeyup="if(event.key === 'Enter') login()">
                <button onclick="login()" class="btn-3d btn-yellow">SE CONNECTER</button>
                <p style="margin-top: 15px; color: #888;">
                    Pas de compte ? <a href="#" onclick="toggleForms()" style="color: #ffce00;">Créer un compte</a>
                </p>
            </div>

            <div id="register-form" class="hidden">
                <h2 style="color: #ffce00;">Créer un compte</h2>
                <input type="text" id="reg-username" placeholder="Pseudo">
                <input type="password" id="reg-password" placeholder="Mot de passe">
                <button onclick="register()" class="btn-3d btn-green">S'INSCRIRE</button>
                <p style="margin-top: 15px; color: #888;">
                    Déjà inscrit ? <a href="#" onclick="toggleForms()" style="color: #ffce00;">Se connecter</a>
                </p>
            </div>

            <p id="message" style="color: #ff5555; margin-top: 15px; font-weight: bold;"></p>
        </div>

        <div class="landing-column">
            <h3 style="margin-top: 0; margin-bottom: 20px; font-size: 1.5em;">
                <img src="/assets/icons/map_info.png" alt="" style="height: 1.2em; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'">En Rotation
            </h3>
            <div id="events-list">
                <div style="color: #888; padding: 20px;">Chargement des événements...</div>
            </div>
        </div>

    </div>
    
    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/index.js"></script>
    
</body>
</html>
