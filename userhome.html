<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Comptes - Brawl Track</title>
    <link rel="icon" type="image/png" href="assets/logo.png">

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/userhome.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Lilita+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="global-navbar"></div>

    <div class="container wide">
        
        <div style="text-align: center; margin: 30px 0 50px 0;">
            <h1 id="welcome-msg" style="font-size: 2.5em; margin-bottom: 5px;">Bienvenue...</h1>
            <p style="color: #888; font-style: italic;">Gérez vos comptes et vos suivis</p>
        </div>

        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap;">
            <div style="display: flex; gap: 10px; max-width: 400px; width: 100%;">
                <input type="text" id="userhome-search-input" placeholder="Chercher un tag (#...)" style="margin: 0;">
                <button onclick="searchFromUserhome()" class="btn-3d btn-yellow w-auto" style="margin: 0; padding: 0 8px;">
                    <img src="/assets/icons/emoji_moba_right.png" alt="Chercher" style="height: 1.8em; vertical-align: middle;" onerror="this.style.display='none'">
                </button>
            </div>
            <button onclick="logout()" class="btn-3d btn-red w-auto" style="margin: 0;">Déconnexion</button>
        </div>
        
        <div class="section-header">
            <h2 class="section-title">
                <img src="/assets/icons/achievements_feature.png" alt="" style="height: 1.2em; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'">Compte Principal
            </h2>
        </div>
        
        <div id="linked-account-container" class="linked-container">
            <div style="width: 100%; text-align: center; color: #666; padding: 20px;">Chargement du compte...</div>
        </div>


        <div class="section-header" style="margin-top: 50px;">
            <h2 class="section-title" style="color: #00d2ff;">
                <img src="/assets/icons/wipeout.png" alt="" style="height: 1.2em; vertical-align: middle; margin-right: 8px; filter: hue-rotate(210deg) brightness(1.2);" onerror="this.style.display='none'">Comptes Suivis
            </h2>
            <span id="counter-follows" class="section-counter">...</span>
        </div>

        <div id="follows-grid" class="grid-section">
            <div style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px;">Chargement...</div>
        </div>

        <div class="section-header" style="margin-top: 50px;">
            <h2 class="section-title" style="color: #ff3333;">
                <img src="/assets/icons/power_match.png" alt="" style="height: 1.2em; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'">CLUBS SUIVIS
            </h2>
            <span id="counter-club" class="section-counter">-</span>
        </div>

        <div id="club-grid" class="grid-section">
            <div style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px; font-style: italic;">
                Fonctionnalité à venir...
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    
    <script src="/js/userhome.js"></script>
</body>
</html>
