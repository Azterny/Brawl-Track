<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Comptes - Brawl Track</title>
    <link rel="icon" type="image/png" href="assets/logo.png">

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/userhome.css">
    <link rel="stylesheet" href="/css/responsive.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Lilita+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- Styles spécifiques Grille & Cartes (Refonte Liste) --- */
        .grid-section {
            display: grid;
            /* On passe sur des cartes plus larges et adaptatives */
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }

        .profile-card {
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px 15px;
            display: flex; /* Format ligne */
            align-items: center; /* Centrage vertical */
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }

        .profile-card:hover {
            transform: translateY(-3px);
            background: #2a2a2a;
            border-color: #ffce00;
            box-shadow: 0 6px 15px rgba(255, 206, 0, 0.15);
        }

        /* L'icône passe à gauche */
        .profile-icon {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            border: 2px solid #444;
            margin-right: 15px;
            object-fit: cover;
            background: #000;
            flex-shrink: 0;
        }

        /* La zone texte occupe l'espace restant */
        .profile-info {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0; /* Indispensable pour couper le texte trop long */
        }

        .profile-name {
            font-family: 'Lilita One', cursive;
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .profile-tag {
            font-family: monospace;
            color: #888;
            font-size: 0.85rem;
        }

        /* Les trophées alignés à droite */
        .profile-trophies {
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: bold;
            color: #ffce00;
            font-size: 1.15rem;
            margin-left: 10px;
            flex-shrink: 0;
            background: #1a1a1a;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .profile-trophies img {
            width: 16px;
        }

        /* Animation Squelette de chargement */
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.2; }
            100% { opacity: 0.6; }
        }
        .skeleton-box {
            background: #444;
            border-radius: 4px;
            animation: pulse 1.5s infinite ease-in-out;
        }
        .skeleton-mode { cursor: default; pointer-events: none; }

        /* Headers de section */
        .section-header {
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .section-title { margin: 0; font-size: 1.5rem; color: #ffce00; }
        .section-counter {
            background: #333; padding: 4px 10px; border-radius: 12px;
            font-size: 0.9rem; color: #ccc; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="global-navbar"></div>

    <div class="container wide">
        
        <div style="text-align: center; margin: 30px 0 50px 0;">
            <h1 id="welcome-msg" style="font-size: 2.5em; margin-bottom: 5px;">Bienvenue...</h1>
            <p style="color: #888; font-style: italic;">Gérez vos comptes et vos suivis</p>
        </div>

        <div style="display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 40px; flex-wrap: wrap;">
            <div style="display: flex; gap: 10px; max-width: 400px; width: 100%;">
                <input type="text" id="userhome-search-input" placeholder="Chercher un tag (#...)" style="margin: 0;">
                <button onclick="searchFromUserhome()" class="btn-3d btn-yellow w-auto" style="margin: 0; padding: 0 20px;">🔎</button>
            </div>
            <button onclick="logout()" class="btn-3d btn-red w-auto" style="margin: 0;">🚪 Déconnexion</button>
        </div>
        
        <div class="section-header">
            <h2 class="section-title">🔐 Vos Comptes</h2>
            <span id="counter-claims" class="section-counter">...</span>
        </div>
        
        <div id="claims-grid" class="grid-section">
            <div style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px;">Chargement...</div>
        </div>


        <div class="section-header" style="margin-top: 50px;">
            <h2 class="section-title" style="color: #00d2ff;">👀 Comptes Suivis</h2>
            <span id="counter-follows" class="section-counter">...</span>
        </div>

        <div id="follows-grid" class="grid-section">
            <div style="grid-column: 1/-1; text-align: center; color: #666; padding: 20px;">Chargement...</div>
        </div>

    </div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    
    <script src="/js/userhome.js"></script>
</body>
</html>
