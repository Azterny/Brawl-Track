<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection...</title>
    
    <script>
        // === CONFIGURATION BRAWL-TRACK ===
        const MAINTENANCE = false;
        // =================================

        const path = window.location.pathname;
        const parts = path.split('/').filter(p => p);
        const searchParams = new URLSearchParams(window.location.search);
        
        // On vérifie si l'URL contient le paramètre de contournement
        const isBypass = searchParams.get('bypass') === 'true';

        // 0. SÉCURITÉ ANTI-CASSURE : Si le navigateur cherche un fichier statique
        if (path.includes('/assets/') || path.includes('/css/') || path.includes('/js/')) {
            // On s'arrête ici pour ne pas bloquer les ressources
        }
        // 1. SYSTÈME DE CONTOURNEMENT (BYPASS) : /pass/...
        else if (parts[0] === 'pass' && parts.length > 1) {
            const targetRoute = parts.slice(1).join('/');
            let redirectPath = `/${targetRoute}`;
            
            // Confort : Si on tape juste /pass/index ou /pass/dashboard, on rajoute .html automatiquement
            if (parts.length === 2 && !redirectPath.includes('.')) {
                redirectPath += '.html';
            }
            
            // On redirige vers la vraie page en injectant le paramètre secret ?bypass=true
            window.location.replace(`${redirectPath}?bypass=true`);
        }
        // 2. REDIRECTION MAINTENANCE GLOBALE
        else if (MAINTENANCE && !path.includes('maintenance.html') && !isBypass && !(parts[0] === 'link')) {
            window.location.replace('/maintenance.html');
        }
        // 3. EXCEPTION : Si on cherche explicitement la page d'erreur
        else if (parts.length > 0 && (parts[0].includes('404') || parts[0].includes('error'))) {
            // Laisse la page 404 s'afficher
        }
        // 4. Route Dashboard Joueur : /player/TAG/BRAWLER
        else if (parts[0] === 'player' && parts[1]) {
            const tag = parts[1];
            let redirect = `/dashboard.html?tag=${tag}`;
            if (parts[2]) redirect += `&brawler=${parts[2]}`;
            // On transmet le bypass si on l'a
            if (isBypass) redirect += `&bypass=true`; 
            window.location.replace(redirect);
        }
        // 5. Route Club : /club/TAG
        else if (parts[0] === 'club' && parts[1]) {
            window.location.replace(`/club.html?tag=${parts[1]}${isBypass ? '&bypass=true' : ''}`);
        }
        // 6. Route Userhome : /home
        else if (parts.length === 1 && parts[0] === 'home') {
            window.location.replace(`/userhome.html${isBypass ? '?bypass=true' : ''}`);
        }
        // 7. Route Leaderboard : /leaderboard/...
        else if (parts[0] === 'leaderboard') {
            let redirect = `/leaderboard.html?`;
            if (parts[1]) redirect += `zone=${parts[1]}`;
            if (parts[2]) redirect += `&cat=${parts[2]}`;
            if (parts[3]) redirect += `&id=${parts[3]}`;
            if (isBypass) redirect += `&bypass=true`;
            window.location.replace(redirect);
        }
        // 8. Route Boîte de réception : /mailbox
        else if (parts.length === 1 && parts[0] === 'mailbox') {
            window.location.replace(`/mailbox.html${isBypass ? '?bypass=true' : ''}`);
        }
    </script>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Lilita+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
    <div id="global-navbar"></div>

    <div class="container" style="margin-top: 15vh; text-align: center; max-width: 500px;">
        
        <div id="loading-content">
            <img src="/assets/loading_icon.png" class="spin" width="50" alt="Chargement...">
            <p style="color: #aaa; margin-top: 20px; font-size: 1.1rem;">Recherche de la page en cours...</p>
        </div>

        <div id="error-content" style="display: none;">
            <h1 style="font-size: 6rem; color: #ff5555; margin: 0; text-shadow: 0 0 20px rgba(255,85,85,0.4);">404</h1>
            <h2 id="error-title" style="color: #ffce00; margin-top: 10px;">Page introuvable</h2>
            <p id="error-desc" style="color: #aaa; margin: 20px 0 30px 0; font-size: 1.1rem;">
                La page que vous recherchez n'existe pas.
            </p>
            <button onclick="window.location.href='/'" class="btn-3d btn-yellow w-auto" style="padding: 10px 30px; font-size: 1.2rem;">🏠 Retour à l'accueil</button>
        </div>
        
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        // Passage du mode Chargement au mode Erreur après 3 secondes
        setTimeout(() => {
            const loadingContent = document.getElementById('loading-content');
            const errorContent = document.getElementById('error-content');
            
            if(loadingContent && errorContent) {
                loadingContent.style.display = 'none';
                errorContent.style.display = 'block';
            }
        }, 3000);

        // Si la redirection a été faite manuellement avec ?target=...
        const target = new URLSearchParams(window.location.search).get('target');
        if (target) {
            // Si on sait déjà que c'est une erreur via ?target=..., on affiche l'erreur directement sans attendre
            document.getElementById('loading-content').style.display = 'none';
            document.getElementById('error-content').style.display = 'block';

            document.getElementById('error-title').innerText = "Joueur ou compte introuvable";
            document.getElementById('error-desc').innerHTML = `La cible <strong>#${decodeURIComponent(target)}</strong> n'existe pas ou vous n'y avez pas accès.`;
        }
    </script>
</body>
</html>
