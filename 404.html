<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection...</title>
    
    <script>
        const path = window.location.pathname;
        const parts = path.split('/').filter(p => p);

        // SÉCURITÉ ANTI-CASSURE : Si le navigateur cherche une image ou un script, on annule le routage SPA !
        if (path.includes('/assets/') || path.includes('/css/') || path.includes('/js/')) {
            // On s'arrête ici. Le navigateur affichera une erreur classique dans la console pour l'image manquante.
        }
        // EXCEPTION : Si on cherche explicitement la page d'erreur
        else if (parts.length > 0 && (parts[0].includes('404') || parts[0].includes('error'))) {
            // Laisse la page 404 s'afficher
        }
        // 1. Route Dashboard Joueur : /player/TAG/BRAWLER
        else if (parts[0] === 'player' && parts[1]) {
            const tag = parts[1];
            let redirect = `/dashboard.html?tag=${tag}`;
            if (parts[2]) redirect += `&brawler=${parts[2]}`;
            window.location.replace(redirect);
        }
        // 2. Route Club : /club/TAG
        else if (parts[0] === 'club' && parts[1]) {
            window.location.replace(`/club.html?tag=${parts[1]}`);
        }
        // 3. Route Userhome : /home
        else if (parts.length === 1 && parts[0] === 'home') {
            window.location.replace(`/userhome.html`);
        }
        // 4. Route Leaderboard : /leaderboard/...
        else if (path.startsWith('/leaderboard')) {
            window.location.replace('/leaderboard.html' + window.location.search);
        }
    </script>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Lilita+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="global-navbar"></div>

    <div class="container" style="margin-top: 15vh; text-align: center; max-width: 500px;">
        <h1 style="font-size: 6rem; color: #ff5555; margin: 0; text-shadow: 0 0 20px rgba(255,85,85,0.4);">404</h1>
        <h2 id="error-title" style="color: #ffce00; margin-top: 10px;">Page introuvable</h2>
        <p id="error-desc" style="color: #aaa; margin: 20px 0 30px 0; font-size: 1.1rem;">
            La page que vous recherchez n'existe pas.
        </p>
        <button onclick="window.location.href='/'" class="btn-3d btn-yellow w-auto" style="padding: 10px 30px; font-size: 1.2rem;">🏠 Retour à l'accueil</button>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/navbar.js"></script>
    <script>
        // Si la redirection a été faite manuellement avec ?target=...
        const target = new URLSearchParams(window.location.search).get('target');
        if (target) {
            document.getElementById('error-title').innerText = "Joueur ou compte introuvable";
            document.getElementById('error-desc').innerHTML = `La cible <strong>#${decodeURIComponent(target)}</strong> n'existe pas ou vous n'y avez pas accès.`;
        }
    </script>
</body>
</html>
