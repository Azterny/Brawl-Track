<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Track - Simulation Export Dashboard</title>
    
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* --- SIMULATION DU DASHBOARD --- */
        body {
            display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #111;
        }
        .dashboard-sim {
            text-align: center; color: white;
        }

        /* --- MODALE (POP-UP CENTRÉE) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 9999; backdrop-filter: blur(5px);
            animation: fadeIn 0.2s ease-out;
        }
        .modal-content {
            background: #222; border: 1px solid #444; border-radius: 16px;
            width: 90%; max-width: 500px; padding: 30px;
            position: relative; text-align: center; color: white;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            animation: slideUpFade 0.3s ease-out;
            max-height: 90vh; overflow-y: auto;
        }
        .close-btn {
            position: absolute; top: 15px; right: 20px;
            font-size: 1.8rem; color: #888; cursor: pointer; transition: color 0.2s;
        }
        .close-btn:hover { color: #fff; }

        /* --- STYLES INTERNES MODALE --- */
        .format-options {
            display: flex; flex-direction: column; gap: 15px; margin: 25px 0;
        }
        .format-card {
            background: #1a1a1a; border: 2px solid #333; border-radius: 12px;
            padding: 15px; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 15px;
        }
        .format-card:hover { border-color: #555; background: #252525; }
        .format-card.selected { border-color: #ffce00; background: rgba(255, 206, 0, 0.1); }
        .format-card input { display: none; }
        .format-card h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #fff; }
        .format-card p { margin: 0; font-size: 0.85rem; color: #aaa; }

        /* Animation de chargement */
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin-anim { animation: spin 1s linear infinite; width: 50px; margin: 20px auto; }

        /* --- CSS DE LA ZONE D'EXPORT (FANTÔME) --- */
        #export-wrapper { position: absolute; left: -9999px; top: 0; padding: 20px; }
        #export-content {
            background: #1a1a1a; padding: 20px; border-radius: 12px;
            box-sizing: border-box; display: flex; flex-direction: column; 
        }
        #export-content.mode-vertical { width: 720px; min-height: 1280px; }
        #export-content.mode-horizontal { width: 1280px; min-height: 720px; }
        .export-brawlers-grid { display: grid; gap: 5px; margin-top: 15px; align-content: flex-start; }
        #export-content.mode-vertical .export-brawlers-grid { grid-template-columns: repeat(5, 1fr); }
        #export-content.mode-horizontal .export-brawlers-grid { grid-template-columns: repeat(9, 1fr); }
        .export-header {
            display: flex; align-items: center; justify-content: space-between; gap: 15px; 
            background-color: rgba(0, 0, 0, 0.4); padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); flex-shrink: 0;
        }
        .stat-box { display: flex; align-items: center; gap: 6px; font-family: 'Lilita One', cursive; }
        .stat-text { font-size: 1.3rem; }
        .stat-img { height: 18px; }
        .stat-trophy-text { font-size: 1.6rem; color: #ffce00; }
        .stat-trophy-img { height: 24px; margin-top: -4px; }
        #export-content.mode-horizontal .stat-text { font-size: 1.7rem; }
        #export-content.mode-horizontal .stat-img { height: 24px; }
        #export-content.mode-horizontal .stat-trophy-text { font-size: 2.3rem; }
        #export-content.mode-horizontal .stat-trophy-img { height: 34px; margin-top: -6px; }

        .preview-image { max-width: 100%; height: auto; border-radius: 8px; border: 2px solid #444; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="dashboard-sim">
        <h2 style="font-family: 'Lilita One', cursive; color: #ffce00;">Dashboard de #2RUPLG8G</h2>
        <p style="color: #aaa;">Simulation de l'intégration finale</p>
        
        <button class="btn-3d btn-grey w-auto" onclick="openExportModal()" title="Générer une image">
            <img src="/assets/icons/picture.png" style="height: 24px; vertical-align: middle;" onerror="this.style.display='none'">
        </button>
    </div>

    <div id="export-modal" class="modal-overlay">
        <div class="modal-content">
            <span class="close-btn" onclick="closeExportModal()">&times;</span>
            
            <div id="modal-step-config">
                <h2 style="font-family: 'Lilita One', cursive; color: #ffce00; margin-top: 0;">Générer une Carte</h2>
                <p style="color: #ccc; font-size: 0.95rem;">Choisissez le format de l'image :</p>
                
                <div class="format-options">
                    <label class="format-card selected" id="card-vertical" onclick="selectFormat('vertical')">
                        <input type="radio" name="export-format" value="vertical" checked>
                        <div style="font-size: 2rem;">📱</div>
                        <div style="text-align: left;">
                            <h3>Portrait (Mobile)</h3>
                            <p>Parfait pour les stories et téléphones.</p>
                        </div>
                    </label>
                    <label class="format-card" id="card-horizontal" onclick="selectFormat('horizontal')">
                        <input type="radio" name="export-format" value="horizontal">
                        <div style="font-size: 2rem;">💻</div>
                        <div style="text-align: left;">
                            <h3>Paysage (PC/Twitter)</h3>
                            <p>Idéal pour les écrans larges et bannières.</p>
                        </div>
                    </label>
                </div>
                
                <button class="btn-3d btn-yellow" onclick="startGeneration()">
                    <img src="/assets/icons/picture.png" style="height: 18px; vertical-align: middle; margin-right: 8px;"> 
                    Générer l'image
                </button>
            </div>

            <div id="modal-step-loading" style="display: none;">
                <h2 style="font-family: 'Lilita One', cursive; margin-top: 0;">Création en cours...</h2>
                <img src="/assets/loading_icon.png" class="spin-anim">
                <p id="export-status" style="color: #aaa; font-style: italic;">Récupération des données...</p>
            </div>

            <div id="modal-step-result" style="display: none;">
                <h2 style="font-family: 'Lilita One', cursive; color: #28a745; margin-top: 0;">Carte prête !</h2>
                <div id="preview-area"></div>
                </div>

        </div>
    </div>


    <div id="export-wrapper">
        <div id="export-content">
            <div class="export-header">
                <div style="display: flex; align-items: center; gap: 15px; max-width: 35%; flex-shrink: 0;">
                    <img id="export-player-icon" src="/assets/default_icon.png" style="width: 50px; height: 50px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0;">
                    <div style="line-height: 1.1; overflow: hidden;">
                        <h2 id="export-player-name" style="margin: 0; font-size: 1.6rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Nom</h2>
                        <div id="export-player-tag" style="color: #888; font-family: monospace; font-size: 0.9rem;">#TAG</div>
                    </div>
                </div>

                <div id="export-club-info" style="display: none; align-items: center; gap: 10px; border-left: 2px solid rgba(255,255,255,0.1); border-right: 2px solid rgba(255,255,255,0.1); padding: 0 15px; flex-grow: 1; justify-content: center; overflow: hidden;">
                    <img id="export-club-icon" src="https://brawlify.com/images/club-badges/96/8000000.webp" style="height: 40px; width: auto; object-fit: contain; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); flex-shrink: 0;">
                    <div style="line-height: 1.1; overflow: hidden; text-align: left;">
                        <div id="export-club-name" style="color: #fff; font-weight: bold; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Club</div>
                        <div id="export-club-tag" style="color: #ffce00; font-family: monospace; font-size: 0.8rem;">#TAG</div>
                    </div>
                </div>

                <div style="display: flex; align-items: center; justify-content: flex-end; gap: 15px; flex-shrink: 0;">
                    <div class="stat-box" style="color: #ccc;">
                        <img src="/assets/icons/wipeout.png" class="stat-img" style="filter: grayscale(100%) brightness(1.5);">
                        <span id="export-player-victories" class="stat-text">0</span>
                    </div>
                    <div class="stat-box" style="color: #C83FA0;">
                        <img src="/assets/total prestige.png" class="stat-img" style="filter: drop-shadow(0 0 2px rgba(200,63,160,0.5));">
                        <span id="export-player-prestiges" class="stat-text">0</span>
                    </div>
                    <div class="stat-box stat-trophy-text">
                        <img src="/assets/trophy_normal.png" class="stat-trophy-img">
                        <span id="export-player-trophies">0</span>
                    </div>
                </div>
            </div>

            <div id="export-brawlers" class="export-brawlers-grid"></div>
            
            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: auto; padding-top: 15px; color: #555; font-family: 'Audiowide', cursive; font-size: 0.85rem;">
                <img src="/assets/logo.png" style="height: 16px; opacity: 0.7; filter: grayscale(50%);">
                BRAWL-TRACK.COM
            </div>
        </div>
    </div>


    <script src="/js/config.js"></script>
    <script>
        // LE TAG EN DUR POUR LA SIMULATION
        const CURRENT_DASHBOARD_TAG = "2RUPLG8G";

        /* --- LOGIQUE DE L'INTERFACE MODALE --- */
        function openExportModal() {
            document.getElementById('export-modal').style.display = 'flex';
            document.getElementById('modal-step-config').style.display = 'block';
            document.getElementById('modal-step-loading').style.display = 'none';
            document.getElementById('modal-step-result').style.display = 'none';
        }

        function closeExportModal() {
            document.getElementById('export-modal').style.display = 'none';
            document.getElementById('preview-area').innerHTML = ''; // Nettoyage
        }

        function selectFormat(format) {
            document.getElementById('card-vertical').classList.remove('selected');
            document.getElementById('card-horizontal').classList.remove('selected');
            document.getElementById(`card-${format}`).classList.add('selected');
            document.querySelector(`input[value="${format}"]`).checked = true;
        }

        /* --- LOGIQUE DE GÉNÉRATION --- */
        function getBrawlerRank(trophies) {
            if (trophies >= 3000) return 'prestige3';
            if (trophies >= 2000) return 'prestige2';
            if (trophies >= 1000) return 'prestige1';
            if (trophies >= 750)  return 'gold';
            if (trophies >= 500)  return 'silver';
            if (trophies >= 250)  return 'bronze';
            return 'wood';
        }

        async function startGeneration() {
            // Passer à l'écran de chargement
            const mode = document.querySelector('input[name="export-format"]:checked').value;
            document.getElementById('modal-step-config').style.display = 'none';
            document.getElementById('modal-step-loading').style.display = 'block';
            const statusDiv = document.getElementById('export-status');
            const previewArea = document.getElementById('preview-area');
            const brawlersContainer = document.getElementById('export-brawlers');
            
            statusDiv.innerText = "Téléchargement des données depuis Supercell...";
            previewArea.innerHTML = "";

            try {
                // Fetch Profil (Utilisation du Tag en dur)
                const res = await fetch(`${API_URL}/api/public/player/${CURRENT_DASHBOARD_TAG}`);
                if (!res.ok) throw new Error("Joueur introuvable");
                const data = await res.json();

                // 1. Appliquer le mode au wrapper
                document.getElementById('export-content').className = `mode-${mode}`;

                // 2. Remplir l'Identité
                let nameColor = data.nameColor ? (data.nameColor.startsWith('0x') ? '#' + data.nameColor.slice(4) : data.nameColor) : '#fff';
                document.getElementById('export-player-name').innerText = data.name;
                document.getElementById('export-player-name').style.color = nameColor;
                document.getElementById('export-player-tag').innerText = data.tag;
                if (data.icon && data.icon.id) {
                    document.getElementById('export-player-icon').src = `https://cdn.brawlify.com/profile-icons/regular/${data.icon.id}.png`;
                }

                // 3. Remplir le Club (Seulement en Horizontal)
                const clubContainer = document.getElementById('export-club-info');
                if (data.club && data.club.name && mode === 'horizontal') {
                    document.getElementById('export-club-name').innerText = data.club.name;
                    document.getElementById('export-club-tag').innerText = data.club.tag;
                    clubContainer.style.display = 'flex';
                    
                    try {
                        const clubRes = await fetch(`${API_URL}/api/public/club/${data.club.tag.replace('#', '')}`);
                        if (clubRes.ok) {
                            const clubData = await clubRes.json();
                            if (clubData.badgeId) {
                                const badgeImg = document.getElementById('export-club-icon');
                                await new Promise((resolve) => {
                                    badgeImg.onload = resolve; 
                                    badgeImg.onerror = resolve;
                                    badgeImg.src = `https://brawlify.com/images/club-badges/96/${clubData.badgeId}.webp`;
                                });
                            }
                        }
                    } catch(e) {}
                } else {
                    clubContainer.style.display = 'none';
                }

                // 4. Remplir les Brawlers
                brawlersContainer.innerHTML = "";
                const activeBrawlers = data.brawlers.filter(b => b.trophies !== -1).sort((a, b) => b.trophies - a.trophies);
                let totalPrestigeCalculated = 0;

                activeBrawlers.forEach(brawler => {
                    const rankName = getBrawlerRank(brawler.trophies);
                    const rankClass = `rank-${rankName}`;
                    const rankIconUrl = `/assets/ranks/${rankName}.webp`;

                    totalPrestigeCalculated += Math.floor(brawler.trophies / 1000);

                    let fontSize = "0.75rem";
                    if (brawler.name.length > 9) fontSize = "0.65rem";
                    if (brawler.name.length > 12) fontSize = "0.55rem";

                    brawlersContainer.innerHTML += `
                        <div class="brawler-card ${rankClass}" style="padding: 4px 6px !important; border-radius: 6px; border-width: 1.5px !important; display: flex; align-items: center; justify-content: space-between; box-shadow: none !important; height: auto !important; min-height: 0 !important;">
                            <div style="display: flex; align-items: center; gap: 5px; max-width: 78%; overflow: hidden;">
                                <img src="https://cdn.brawlify.com/brawlers/borderless/${brawler.id}.png" style="width: 26px; height: 26px; object-fit: contain; background: #111; border: 1px solid #444; border-radius: 4px; flex-shrink: 0;">
                                <div style="display: flex; flex-direction: column; align-items: flex-start; overflow: hidden; line-height: 1.1;">
                                    <div style="color: #fff; font-weight: 800; font-size: ${fontSize}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-transform: uppercase;">
                                        ${brawler.name}
                                    </div>
                                    <div style="color: #ffce00; font-weight: 900; font-size: 0.95rem; margin-top: 1px;">
                                        ${brawler.trophies}
                                    </div>
                                </div>
                            </div>
                            <img src="${rankIconUrl}" style="height: 22px; width: auto; max-width: 24px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));">
                        </div>
                    `;
                });

                // 5. Remplir les Stats Globales
                const totalVictoriesCalculated = (data['3vs3Victories'] || 0) + (data.soloVictories || 0) + (data.duoVictories || 0);
                document.getElementById('export-player-trophies').innerText = data.trophies.toLocaleString('en-US');
                document.getElementById('export-player-victories').innerText = totalVictoriesCalculated.toLocaleString('en-US');
                document.getElementById('export-player-prestiges').innerText = totalPrestigeCalculated;

                statusDiv.innerText = "Construction de l'image (cela peut prendre quelques secondes)...";

                // 6. Rendu HTML2Canvas
                setTimeout(() => {
                    html2canvas(document.getElementById('export-content'), {
                        backgroundColor: '#1a1a1a',
                        useCORS: true,
                        scale: 2
                    }).then(canvas => {
                        const imgDataUrl = canvas.toDataURL("image/png");
                        
                        // Injection dans l'étape 3
                        const previewImg = document.createElement('img');
                        previewImg.src = imgDataUrl;
                        previewImg.className = 'preview-image';
                        previewArea.appendChild(previewImg);

                        const downloadBtn = document.createElement('button');
                        downloadBtn.className = 'btn-3d btn-green w-auto';
                        downloadBtn.innerHTML = '⬇️ Télécharger l\'image HD';
                        downloadBtn.onclick = () => {
                            let link = document.createElement('a');
                            link.download = `BrawlTrack_${data.name}_${mode}.png`;
                            link.href = imgDataUrl;
                            link.click();
                        };
                        previewArea.appendChild(downloadBtn);

                        // Basculer l'affichage vers le Résultat final
                        document.getElementById('modal-step-loading').style.display = 'none';
                        document.getElementById('modal-step-result').style.display = 'block';

                    }).catch(err => {
                        console.error(err);
                        statusDiv.innerHTML = "<span style='color: #ff5555;'>Erreur lors de la capture d'image.</span>";
                    });
                }, 500);

            } catch (e) {
                statusDiv.innerHTML = `<span style='color: #ff5555;'>Erreur : ${e.message}</span>`;
            }
        }
    </script>
</body>
</html>
