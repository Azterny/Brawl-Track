<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Track - Générateur d'Image</title>
    
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        .beta-ui {
            max-width: 650px; margin: 50px auto; padding: 30px;
            background: #222; border-radius: 12px; text-align: center;
            border: 1px solid #444; color: white;
        }

        #export-wrapper {
            position: absolute; left: -9999px; top: 0;
            padding: 20px; 
        }

        #export-content {
            background: #1a1a1a; 
            padding: 20px; 
            border-radius: 12px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column; 
        }

        #export-content.mode-vertical { width: 720px; min-height: 1280px; }
        #export-content.mode-horizontal { width: 1280px; min-height: 720px; }

        .export-brawlers-grid {
            display: grid; gap: 6px; margin-top: 15px; align-content: flex-start; 
        }
        
        #export-content.mode-vertical .export-brawlers-grid { grid-template-columns: repeat(4, 1fr); }
        #export-content.mode-horizontal .export-brawlers-grid { grid-template-columns: repeat(7, 1fr); }

        #status { margin-top: 15px; color: #aaa; font-style: italic; font-size: 0.9rem; }
        
        .export-header {
            display: flex; align-items: center; justify-content: space-between; gap: 15px; 
            background-color: rgba(0, 0, 0, 0.4); 
            padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1);
            flex-shrink: 0;
        }

        /* --- Zone de prévisualisation --- */
        #preview-area {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .preview-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            border: 2px solid #444;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            animation: slideUpFade 0.4s ease-out;
        }
    </style>
</head>
<body>

    <div class="beta-ui">
        <h1 style="color: #ffce00; font-family: 'Lilita One', cursive; margin-top: 0;">Générateur d'Image</h1>
        <p style="font-size: 0.95rem; color: #ccc;">Saisissez un tag pour prévisualiser la carte</p>
        
        <input type="text" id="tag-input" placeholder="Tag Joueur (ex: 98V02L)" style="text-align: center;">
        
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
            <button class="btn-3d btn-blue w-auto" onclick="generateImage('vertical')">
                <img src="/assets/icons/picture.png" style="height: 18px; vertical-align: middle; margin-right: 5px;" onerror="this.style.display='none'"> 
                Portrait
            </button>
            <button class="btn-3d btn-yellow w-auto" onclick="generateImage('horizontal')">
                <img src="/assets/icons/picture.png" style="height: 18px; vertical-align: middle; margin-right: 5px;" onerror="this.style.display='none'"> 
                Paysage
            </button>
        </div>
        
        <div id="status"></div>

        <div id="preview-area"></div>
    </div>

    <div id="export-wrapper">
        <div id="export-content">
            <div class="export-header">
                <div style="display: flex; align-items: center; gap: 15px; max-width: 35%; flex-shrink: 0;">
                    <img id="export-player-icon" src="/assets/default_icon.png" style="width: 50px; height: 50px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.2); flex-shrink: 0;">
                    <div style="line-height: 1.1; overflow: hidden;">
                        <h2 id="export-player-name" style="margin: 0; font-size: 1.6rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Nom</h2>
                        <div id="export-player-tag" style="color: #888; font-family: monospace; font-size: 0.9rem;">#TAG</div>
                    </div>
                </div>

                <div id="export-club-info" style="display: none; align-items: center; gap: 10px; border-left: 2px solid rgba(255,255,255,0.1); border-right: 2px solid rgba(255,255,255,0.1); padding: 0 15px; flex-grow: 1; justify-content: center; overflow: hidden;">
                    <img id="export-club-icon" src="https://brawlify.com/images/club-badges/96/8000000.webp" style="width: 36px; height: 36px; object-fit: contain; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.5)); flex-shrink: 0;">
                    <div style="line-height: 1.1; overflow: hidden; text-align: left;">
                        <div id="export-club-name" style="color: #fff; font-weight: bold; font-size: 1.1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Club</div>
                        <div id="export-club-tag" style="color: #ffce00; font-family: monospace; font-size: 0.8rem;">#TAG</div>
                    </div>
                </div>

                <div style="display: flex; align-items: center; justify-content: flex-end; gap: 15px; font-family: 'Lilita One', cursive; flex-shrink: 0;">
                    <div style="color: #ccc; font-size: 1.3rem; display: flex; align-items: center; gap: 6px;">
                        <img src="/assets/icons/wipeout.png" style="height: 18px; filter: grayscale(100%) brightness(1.5);">
                        <span id="export-player-victories">0</span>
                    </div>
                    <div style="color: #C83FA0; font-size: 1.3rem; display: flex; align-items: center; gap: 6px;">
                        <img src="/assets/total prestige.png" style="height: 18px; filter: drop-shadow(0 0 2px rgba(200,63,160,0.5));">
                        <span id="export-player-prestiges">0</span>
                    </div>
                    <div style="color: #ffce00; font-size: 1.6rem; font-weight: bold; display: flex; align-items: center; gap: 6px;">
                        <img src="/assets/trophy_normal.png" style="height: 24px; margin-top: -4px;">
                        <span id="export-player-trophies">0</span>
                    </div>
                </div>
            </div>

            <div id="export-brawlers" class="export-brawlers-grid"></div>
            
            <div style="display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: auto; padding-top: 15px; color: #555; font-family: 'Audiowide', cursive; font-size: 0.85rem;">
                <img src="/assets/logo.png" style="height: 16px; opacity: 0.7; filter: grayscale(50%);">
                BRAWL-TRACK.COM
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script>
        function getBrawlerRank(trophies) {
            if (trophies >= 3000) return 'prestige3';
            if (trophies >= 2000) return 'prestige2';
            if (trophies >= 1000) return 'prestige1';
            if (trophies >= 750)  return 'gold';
            if (trophies >= 500)  return 'silver';
            if (trophies >= 250)  return 'bronze';
            return 'wood';
        }

        async function generateImage(mode) {
            const tagInput = document.getElementById('tag-input').value.trim().toUpperCase().replace('#', '').replace('O', '0');
            const statusDiv = document.getElementById('status');
            const previewArea = document.getElementById('preview-area');
            const brawlersContainer = document.getElementById('export-brawlers');
            
            if (!tagInput) {
                statusDiv.innerHTML = "<span style='color: #ff5555;'>Veuillez entrer un Tag !</span>"; 
                return;
            }

            statusDiv.innerHTML = "Téléchargement des données (Supercell)...";
            previewArea.innerHTML = ""; // On nettoie l'ancienne prévisualisation

            try {
                const res = await fetch(`${API_URL}/api/public/player/${tagInput}`);
                if (!res.ok) throw new Error("Joueur introuvable");
                const data = await res.json();

                let nameColor = data.nameColor ? (data.nameColor.startsWith('0x') ? '#' + data.nameColor.slice(4) : data.nameColor) : '#fff';
                document.getElementById('export-player-name').innerText = data.name;
                document.getElementById('export-player-name').style.color = nameColor;
                document.getElementById('export-player-tag').innerText = data.tag;
                if (data.icon && data.icon.id) {
                    document.getElementById('export-player-icon').src = `https://cdn.brawlify.com/profile-icons/regular/${data.icon.id}.png`;
                }

                const clubContainer = document.getElementById('export-club-info');
                if (data.club && data.club.name) {
                    document.getElementById('export-club-name').innerText = data.club.name;
                    document.getElementById('export-club-tag').innerText = data.club.tag;
                    clubContainer.style.display = 'flex';
                    
                    try {
                        const clubRes = await fetch(`${API_URL}/api/public/club/${data.club.tag.replace('#', '')}`);
                        if (clubRes.ok) {
                            const clubData = await clubRes.json();
                            if (clubData.badgeId) {
                                document.getElementById('export-club-icon').src = `https://brawlify.com/images/club-badges/96/${clubData.badgeId}.webp`;
                            }
                        }
                    } catch(e) {}
                } else {
                    clubContainer.style.display = 'none';
                }

                brawlersContainer.innerHTML = "";
                const activeBrawlers = data.brawlers.filter(b => b.trophies !== -1).sort((a, b) => b.trophies - a.trophies);
                let totalPrestigeCalculated = 0;

                activeBrawlers.forEach(brawler => {
                    const rankName = getBrawlerRank(brawler.trophies);
                    const rankClass = `rank-${rankName}`;
                    const rankIconUrl = `/assets/ranks/${rankName}.webp`;

                    totalPrestigeCalculated += Math.floor(brawler.trophies / 1000);

                    let fontSize = "0.75rem";
                    if (brawler.name.length > 11) fontSize = "0.65rem";
                    if (brawler.name.length > 14) fontSize = "0.55rem";

                    brawlersContainer.innerHTML += `
                        <div class="brawler-card ${rankClass}" style="padding: 4px 8px !important; border-radius: 6px; border-width: 1.5px !important; display: flex; align-items: center; justify-content: space-between; box-shadow: none !important; height: auto !important; min-height: 0 !important;">
                            <div style="display: flex; align-items: center; gap: 6px; max-width: 78%; overflow: hidden;">
                                <img src="https://cdn.brawlify.com/brawlers/borderless/${brawler.id}.png" style="width: 28px; height: 28px; object-fit: contain; background: #111; border: 1px solid #444; border-radius: 4px; flex-shrink: 0;">
                                <div style="display: flex; flex-direction: column; align-items: flex-start; overflow: hidden; line-height: 1.1;">
                                    <div style="color: #fff; font-weight: 800; font-size: ${fontSize}; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-transform: uppercase;">
                                        ${brawler.name}
                                    </div>
                                    <div style="color: #ffce00; font-weight: 900; font-size: 0.95rem; margin-top: 2px;">
                                        ${brawler.trophies}
                                    </div>
                                </div>
                            </div>
                            <img src="${rankIconUrl}" style="height: 24px; width: auto; max-width: 26px; object-fit: contain; flex-shrink: 0; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));">
                        </div>
                    `;
                });

                const totalVictoriesCalculated = (data['3vs3Victories'] || 0) + (data.soloVictories || 0) + (data.duoVictories || 0);
                document.getElementById('export-player-trophies').innerText = data.trophies.toLocaleString('en-US');
                document.getElementById('export-player-victories').innerText = totalVictoriesCalculated.toLocaleString('en-US');
                document.getElementById('export-player-prestiges').innerText = totalPrestigeCalculated;

                document.getElementById('export-content').className = `mode-${mode}`;
                statusDiv.innerHTML = "Rendu de l'image en cours (Ne pas quitter la page)...";

                setTimeout(() => {
                    html2canvas(document.getElementById('export-content'), {
                        backgroundColor: '#1a1a1a',
                        useCORS: true,
                        scale: 2
                    }).then(canvas => {
                        const imgDataUrl = canvas.toDataURL("image/png");
                        
                        // 1. Afficher l'image générée
                        const previewImg = document.createElement('img');
                        previewImg.src = imgDataUrl;
                        previewImg.className = 'preview-image';
                        previewArea.appendChild(previewImg);

                        // 2. Ajouter le bouton de téléchargement final
                        const downloadBtn = document.createElement('button');
                        downloadBtn.className = 'btn-3d btn-green w-auto';
                        downloadBtn.innerHTML = '⬇️ Télécharger l\'image HD';
                        downloadBtn.onclick = () => {
                            let link = document.createElement('a');
                            link.download = `BrawlTrack_${data.name}_${mode}.png`;
                            link.href = imgDataUrl;
                            link.click();
                        };
                        previewArea.appendChild(downloadBtn);

                        statusDiv.innerHTML = `<span style="color: #28a745;">✓ Aperçu généré avec succès !</span>`;
                    }).catch(err => {
                        console.error(err);
                        statusDiv.innerHTML = "<span style='color: #ff5555;'>Erreur de rendu HTML2Canvas.</span>";
                    });
                }, 1000);

            } catch (e) {
                statusDiv.innerHTML = "<span style='color: #ff5555;'>Erreur : Joueur introuvable ou API indisponible.</span>";
            }
        }
    </script>
</body>
</html>
