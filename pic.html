<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Track - Générateur d'Image (Bêta)</title>
    
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        /* Interface de contrôle pour la Bêta */
        .beta-ui {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background: #222;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #444;
            color: white;
        }

        /* --- ZONE FANTÔME (Invisible pour l'utilisateur, lisible pour html2canvas) --- */
        #export-wrapper {
            position: absolute;
            left: -9999px; /* Caché hors de l'écran */
            top: 0;
            background: #1a1a1a; /* Fond de ton site */
            padding: 30px;
            border-radius: 16px;
        }

        /* Tailles selon le mode choisi */
        #export-content.mode-vertical { width: 600px; }
        #export-content.mode-horizontal { width: 1200px; }

        /* Grille des Brawlers adaptée pour l'export */
        .export-brawlers-grid {
            display: grid;
            gap: 15px;
            margin-top: 25px;
        }
        /* 3 colonnes en vertical, 6 en horizontal */
        #export-content.mode-vertical .export-brawlers-grid { grid-template-columns: repeat(3, 1fr); }
        #export-content.mode-horizontal .export-brawlers-grid { grid-template-columns: repeat(6, 1fr); }

        #status { margin-top: 15px; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

    <div class="beta-ui">
        <h1 style="color: #ffce00; font-family: 'Lilita One', cursive;">Générateur d'Image</h1>
        <p>Entrez un Tag Joueur pour générer sa carte de statistiques :</p>
        
        <input type="text" id="tag-input" placeholder="Tag (ex: 98V02L)" style="text-align: center;">
        
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
            <button class="btn-3d btn-blue w-auto" onclick="generateImage('vertical')">
                <img src="/assets/icons/picture.png" style="height: 18px; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'"> 
                Mode Vertical
            </button>
            <button class="btn-3d btn-yellow w-auto" onclick="generateImage('horizontal')">
                <img src="/assets/icons/picture.png" style="height: 18px; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'"> 
                Mode Horizontal
            </button>
        </div>
        
        <div id="status"></div>
        <div id="preview-container" style="margin-top: 20px;"></div>
    </div>

    <div id="export-wrapper">
        <div id="export-content">
            <div class="header-bar" style="display: flex; align-items: center; gap: 20px; box-shadow: none;">
                <img id="export-player-icon" src="/assets/default_icon.png" style="width: 84px; height: 84px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2);">
                <div style="flex-grow: 1;">
                    <h2 id="export-player-name" style="margin: 0; font-size: 2.2rem; color: #fff;">Nom du Joueur</h2>
                    <div id="export-player-tag" style="color: #888; font-family: monospace; font-size: 1rem;">#TAG</div>
                </div>
                <div style="text-align: right; color: #ffce00; font-size: 1.8rem; font-weight: bold; font-family: 'Lilita One', cursive;">
                    <img src="/assets/trophy_normal.png" style="height: 28px; vertical-align: middle; margin-right: 5px;">
                    <span id="export-player-trophies">0</span>
                </div>
            </div>

            <div id="export-brawlers" class="export-brawlers-grid"></div>
            
            <div style="text-align: center; margin-top: 20px; color: #666; font-family: 'Audiowide', cursive;">
                BRAWL-TRACK.COM
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script>
        // Fonction de calcul des rangs (copiée de ton dashboard.js)
        function getBrawlerRank(trophies) {
            if (trophies >= 3000) return 'prestige3';
            if (trophies >= 2000) return 'prestige2';
            if (trophies >= 1000) return 'prestige1';
            if (trophies >= 750)  return 'gold';
            if (trophies >= 500)  return 'silver';
            if (trophies >= 250)  return 'bronze';
            return 'wood';
        }

        async function generateImage(mode) {
            const tagInput = document.getElementById('tag-input').value.trim().toUpperCase().replace('#', '').replace('O', '0');
            const statusDiv = document.getElementById('status');
            const brawlersContainer = document.getElementById('export-brawlers');
            
            if (!tagInput) {
                statusDiv.innerHTML = "<span style='color: #ff5555;'>Veuillez entrer un Tag !</span>";
                return;
            }

            statusDiv.innerHTML = "Récupération des données depuis l'API...";

            try {
                // 1. Appel à ton API existante
                const res = await fetch(`${API_URL}/api/public/player/${tagInput}`);
                if (!res.ok) throw new Error("Joueur introuvable");
                const data = await res.json();

                // 2. Remplissage du Header Fantôme
                let nameColor = data.nameColor ? (data.nameColor.startsWith('0x') ? '#' + data.nameColor.slice(4) : data.nameColor) : '#fff';
                document.getElementById('export-player-name').innerText = data.name;
                document.getElementById('export-player-name').style.color = nameColor;
                document.getElementById('export-player-tag').innerText = data.tag;
                document.getElementById('export-player-trophies').innerText = data.trophies;
                if (data.icon && data.icon.id) {
                    document.getElementById('export-player-icon').src = `https://cdn.brawlify.com/profile-icons/regular/${data.icon.id}.png`;
                }

                // 3. Construction des cartes Brawlers
                brawlersContainer.innerHTML = "";
                
                // On filtre les brawlers verrouillés (trophies = -1) et on trie par trophées
                const activeBrawlers = data.brawlers.filter(b => b.trophies !== -1).sort((a, b) => b.trophies - a.trophies);

                activeBrawlers.forEach(brawler => {
                    const rankClass = `rank-${getBrawlerRank(brawler.trophies)}`;
                    brawlersContainer.innerHTML += `
                        <div class="brawler-card ${rankClass}" style="position: relative; padding: 10px; border-radius: 12px; text-align: center; display: flex; flex-direction: column; align-items: center;">
                            <img src="https://cdn.brawlify.com/brawlers/borderless/${brawler.id}.png" style="width: 60px; height: 60px; object-fit: contain;">
                            <div style="color: white; font-weight: bold; margin-top: 5px; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;">${brawler.name}</div>
                            <div style="color: #ffce00; font-weight: bold; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 3px;">
                                <img src="/assets/trophy_normal.png" style="width: 16px;"> ${brawler.trophies}
                            </div>
                        </div>
                    `;
                });

                // 4. Application du Mode (Vertical ou Horizontal)
                const exportContent = document.getElementById('export-content');
                exportContent.className = `mode-${mode}`;

                statusDiv.innerHTML = "Génération de l'image en cours (veuillez patienter)...";

                // 5. Utilisation de HTML2Canvas
                // Timeout léger pour laisser au navigateur le temps de charger les images Brawlify
                setTimeout(() => {
                    html2canvas(document.getElementById('export-wrapper'), {
                        backgroundColor: '#1a1a1a',
                        useCORS: true, // Très important pour les images brawlify (cross-origin)
                        scale: 2 // Améliore la qualité (HD)
                    }).then(canvas => {
                        // Téléchargement automatique
                        let link = document.createElement('a');
                        link.download = `BrawlTrack_${data.name}_${mode}.png`;
                        link.href = canvas.toDataURL("image/png");
                        link.click();
                        
                        statusDiv.innerHTML = `<span style="color: #28a745;">Image téléchargée avec succès !</span>`;
                    }).catch(err => {
                        console.error(err);
                        statusDiv.innerHTML = "<span style='color: #ff5555;'>Erreur lors de la création de l'image.</span>";
                    });
                }, 1000); // 1 seconde de battement

            } catch (e) {
                console.error(e);
                statusDiv.innerHTML = "<span style='color: #ff5555;'>Erreur : Impossible de charger les données du joueur.</span>";
            }
        }
    </script>
</body>
</html>
