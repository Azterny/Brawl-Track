<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Track - Générateur d'Image (Bêta Compacte)</title>
    
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <style>
        .beta-ui {
            max-width: 600px; margin: 50px auto; padding: 30px;
            background: #222; border-radius: 12px; text-align: center;
            border: 1px solid #444; color: white;
        }

        #export-wrapper {
            position: absolute; left: -9999px; top: 0;
            background: #1a1a1a; padding: 30px; border-radius: 16px;
        }

        #export-content.mode-vertical { width: 650px; }
        #export-content.mode-horizontal { width: 1200px; }

        /* Grille compacte avec des espaces réduits */
        .export-brawlers-grid {
            display: grid;
            gap: 10px; /* Espace réduit entre les cases */
            margin-top: 25px;
        }
        
        /* On passe à 3 colonnes en vertical et 5 en horizontal pour laisser la place au texte */
        #export-content.mode-vertical .export-brawlers-grid { grid-template-columns: repeat(3, 1fr); }
        #export-content.mode-horizontal .export-brawlers-grid { grid-template-columns: repeat(5, 1fr); }

        #status { margin-top: 15px; color: #aaa; font-style: italic; }
    </style>
</head>
<body>

    <div class="beta-ui">
        <h1 style="color: #ffce00; font-family: 'Lilita One', cursive;">Générateur d'Image (Compact)</h1>
        <p>Entrez un Tag Joueur pour générer sa carte :</p>
        
        <input type="text" id="tag-input" placeholder="Tag (ex: 98V02L)" style="text-align: center;">
        
        <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
            <button class="btn-3d btn-blue w-auto" onclick="generateImage('vertical')">
                <img src="/assets/icons/picture.png" style="height: 18px; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'"> 
                Mode Vertical
            </button>
            <button class="btn-3d btn-yellow w-auto" onclick="generateImage('horizontal')">
                <img src="/assets/icons/picture.png" style="height: 18px; vertical-align: middle; margin-right: 8px;" onerror="this.style.display='none'"> 
                Mode Horizontal
            </button>
        </div>
        
        <div id="status"></div>
    </div>

    <div id="export-wrapper">
        <div id="export-content">
            <div class="header-bar" style="display: flex; align-items: center; gap: 20px; box-shadow: none;">
                <img id="export-player-icon" src="/assets/default_icon.png" style="width: 84px; height: 84px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2);">
                <div style="flex-grow: 1;">
                    <h2 id="export-player-name" style="margin: 0; font-size: 2.2rem; color: #fff;">Nom</h2>
                    <div id="export-player-tag" style="color: #888; font-family: monospace; font-size: 1rem;">#TAG</div>
                </div>
                <div style="text-align: right; color: #ffce00; font-size: 1.8rem; font-weight: bold; font-family: 'Lilita One', cursive;">
                    <img src="/assets/trophy_normal.png" style="height: 28px; vertical-align: middle; margin-right: 5px;">
                    <span id="export-player-trophies">0</span>
                </div>
            </div>

            <div id="export-brawlers" class="export-brawlers-grid"></div>
            
            <div style="text-align: center; margin-top: 20px; color: #666; font-family: 'Audiowide', cursive;">
                BRAWL-TRACK.COM
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script>
        function getBrawlerRank(trophies) {
            if (trophies >= 3000) return 'prestige3';
            if (trophies >= 2000) return 'prestige2';
            if (trophies >= 1000) return 'prestige1';
            if (trophies >= 750)  return 'gold';
            if (trophies >= 500)  return 'silver';
            if (trophies >= 250)  return 'bronze';
            return 'wood';
        }

        async function generateImage(mode) {
            const tagInput = document.getElementById('tag-input').value.trim().toUpperCase().replace('#', '').replace('O', '0');
            const statusDiv = document.getElementById('status');
            const brawlersContainer = document.getElementById('export-brawlers');
            
            if (!tagInput) {
                statusDiv.innerHTML = "<span style='color: #ff5555;'>Veuillez entrer un Tag !</span>"; return;
            }

            statusDiv.innerHTML = "Récupération des données...";

            try {
                const res = await fetch(`${API_URL}/api/public/player/${tagInput}`);
                if (!res.ok) throw new Error("Joueur introuvable");
                const data = await res.json();

                let nameColor = data.nameColor ? (data.nameColor.startsWith('0x') ? '#' + data.nameColor.slice(4) : data.nameColor) : '#fff';
                document.getElementById('export-player-name').innerText = data.name;
                document.getElementById('export-player-name').style.color = nameColor;
                document.getElementById('export-player-tag').innerText = data.tag;
                document.getElementById('export-player-trophies').innerText = data.trophies;
                if (data.icon && data.icon.id) {
                    document.getElementById('export-player-icon').src = `https://cdn.brawlify.com/profile-icons/regular/${data.icon.id}.png`;
                }

                brawlersContainer.innerHTML = "";
                const activeBrawlers = data.brawlers.filter(b => b.trophies !== -1).sort((a, b) => b.trophies - a.trophies);

                activeBrawlers.forEach(brawler => {
                    const rankName = getBrawlerRank(brawler.trophies);
                    const rankClass = `rank-${rankName}`;
                    const rankIconUrl = `/assets/ranks/${rankName}.webp`; // Utilise tes images locales de rangs

                    // --- NOUVEAU DESIGN COMPACT ---
                    brawlersContainer.innerHTML += `
                        <div class="brawler-card ${rankClass}" style="padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between;">
                            
                            <div style="color: white; font-weight: bold; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%;">
                                ${brawler.name}
                            </div>
                            
                            <div style="display: flex; align-items: center; gap: 8px; flex-shrink: 0;">
                                <img src="${rankIconUrl}" style="width: 20px; height: 20px; object-fit: contain;">
                                <div style="color: #ffce00; font-weight: bold; font-size: 1rem; display: flex; align-items: center; gap: 4px;">
                                    ${brawler.trophies} <img src="/assets/trophy_normal.png" style="width: 14px;">
                                </div>
                            </div>

                        </div>
                    `;
                });

                document.getElementById('export-content').className = `mode-${mode}`;
                statusDiv.innerHTML = "Génération de l'image en cours...";

                setTimeout(() => {
                    html2canvas(document.getElementById('export-wrapper'), {
                        backgroundColor: '#1a1a1a',
                        useCORS: true,
                        scale: 2
                    }).then(canvas => {
                        let link = document.createElement('a');
                        link.download = `BrawlTrack_${data.name}_${mode}.png`;
                        link.href = canvas.toDataURL("image/png");
                        link.click();
                        statusDiv.innerHTML = `<span style="color: #28a745;">Image téléchargée !</span>`;
                    }).catch(err => {
                        console.error(err);
                        statusDiv.innerHTML = "<span style='color: #ff5555;'>Erreur de génération.</span>";
                    });
                }, 800);

            } catch (e) {
                statusDiv.innerHTML = "<span style='color: #ff5555;'>Erreur : Joueur introuvable.</span>";
            }
        }
    </script>
</body>
</html>
