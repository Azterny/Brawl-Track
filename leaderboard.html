<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Track - Classements</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="global-navbar"></div>

    <h1 id="page-title" style="text-align: center; margin-top: 100px; margin-bottom: 20px;">Classements</h1>

    <div class="container wide main-content" style="margin-top: 0;">
        
        <div id="mobile-brawler-select-container"></div>

        <div class="leaderboard-header" id="lb-header" style="display: none;">
            <select id="zone-select" class="zone-selector" onchange="changeZone()">
                <option value="global">🌍 Global</option>
                <option value="fr">🇫🇷 France</option>
                <option value="gb">🇬🇧 Royaume-Uni</option>
                <option value="us">🇺🇸 États-Unis</option>
                <option value="de">🇩🇪 Allemagne</option>
                <option value="es">🇪🇸 Espagne</option>
                <option value="it">🇮🇹 Italie</option>
                <option value="br">🇧🇷 Brésil</option>
                <option value="jp">🇯🇵 Japon</option>
                <option value="kr">🇰🇷 Corée du Sud</option>
                <option value="ca">🇨🇦 Canada</option>
            </select>
            <input type="text" id="search-input" class="search-bar" placeholder="Rechercher un Joueur ou un Club..." oninput="filterList()">
        </div>

        <div id="dynamic-content"></div>
        
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/leaderboard.js"></script>
</body>
</html>
