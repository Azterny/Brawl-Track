<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Track - Classements</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="navbar-container"></div>

    <div id="global-navbar"></div>
        
        <h1 id="page-title" style="text-align: center; margin-bottom: 20px;">Classements</h1>
        
        <div id="mobile-brawler-select-container"></div>

        <div class="leaderboard-header" id="lb-header" style="display: none;">
            <select id="zone-select" class="zone-selector" onchange="changeZone()">
                <option value="global">Global</option>
                <option value="fr">France</option>
                <option value="gb">Royaume-Uni</option>
                <option value="us">États-Unis</option>
            </select>
            <input type="text" id="search-input" class="search-bar" placeholder="Rechercher (Nom ou Tag)..." oninput="filterList()">
        </div>

        <div id="dynamic-content"></div>
        
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/leaderboard.js"></script>
</body>
</html>
