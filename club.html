<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Track - Club</title>
    <link rel="icon" type="image/png" href="/assets/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Lilita+One&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="global-navbar"></div>

    <div class="container" style="max-width: 900px; margin-top: 20px;">
        <div class="header-bar">
            <div id="dashboard-header">
                <img id="club-icon" src="/assets/default_icon.png" alt="Club Icon" style="border-radius: 15px; width: 80px; height: 80px; object-fit: contain;">
                <div id="player-info">
                    <h1 id="club-name">Chargement...</h1>
                    <div id="club-tag" style="margin-top: 2px; color: #ffce00; font-family: monospace;">#TAG</div>
                </div>
                <div id="header-actions">
                    <button id="btn-follow-club" class="btn-3d btn-yellow" style="margin: 0; padding: 8px 20px;" onclick="alert('Fonctionnalité Follow Club bientôt disponible !')">FOLLOW</button>
                </div>
            </div>
        </div>

        <div class="view-section active">
            <div id="stats-area" class="stats-grid" style="grid-template-columns: 1fr 1fr; max-width: 600px; margin: 0 auto;">
                </div>

            <div style="margin-top: 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px;">
                <h2 style="margin: 0; color: #fff; font-family: 'Lilita One';">👥 Membres (<span id="members-count">0</span>/30)</h2>
            </div>
            
            <div id="members-list" style="margin-top: 20px; display: flex; flex-direction: column; gap: 10px;">
                </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/navbar.js"></script>
    <script src="/js/club.js"></script>
</body>
</html>
