<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin Brut - Brawl Track</title>
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- STYLE PRIMAIRE & FONCTIONNEL --- */
        body {
            background-color: #000;
            color: #ccc;
            font-family: monospace, sans-serif;
            margin: 0; padding: 20px;
            font-size: 14px;
        }

        #main-container {
            max-width: 1400px;
            margin: 0 auto;
            border: 1px solid #444;
            background: #111;
            padding: 10px;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .login-box { border: 2px solid #ffce00; padding: 20px; text-align: center; background: #111; }

        header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #ffce00; padding-bottom: 10px; margin-bottom: 15px;
        }
        h1 { margin: 0; color: #ffce00; font-size: 1.5em; text-transform: uppercase; }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { border: 1px solid #333; background: #0a0a0a; padding: 10px; }
        .stat-box h3 { margin: 0 0 5px 0; font-size: 0.8em; color: #888; text-transform: uppercase; }
        .stat-box p { margin: 0; font-size: 1.2em; color: #fff; font-weight: bold; }

        .controls {
            background: #222; border: 1px solid #444; padding: 10px; margin-bottom: 10px;
            display: flex; flex-wrap: wrap; gap: 15px; align-items: center;
        }
        
        input, select, button, textarea {
            background: #000; color: #fff; border: 1px solid #555;
            padding: 5px 10px; font-family: monospace; font-size: 1em; cursor: pointer;
        }
        input:focus, select:focus, textarea:focus { border-color: #ffce00; outline: none; }
        
        button:hover { background: #333; }
        button.active { background: #ffce00; color: #000; font-weight: bold; border-color: #ffce00; }
        
        .btn-green { color: #28a745; border-color: #28a745; }
        .btn-green:hover { background: #28a745; color: #000; }
        .btn-red { color: #ff5555; border-color: #ff5555; }
        .btn-red:hover { background: #ff5555; color: #000; }
        .btn-blue { color: #007bff; border-color: #007bff; }
        .btn-blue:hover { background: #007bff; color: #fff; }
        .btn-orange { color: #fd7e14; border-color: #fd7e14; }
        .btn-orange:hover { background: #fd7e14; color: #fff; }

        table { width: 100%; border-collapse: collapse; font-size: 0.95em; }
        th { text-align: left; border-bottom: 2px solid #444; padding: 8px; color: #888; text-transform: uppercase; }
        td { border-bottom: 1px solid #222; padding: 6px 8px; vertical-align: middle; }
        tr:hover { background: #1a1a1a; }

        .hidden { display: none !important; }
        .badge { display: inline-block; padding: 2px 5px; border: 1px solid #444; color: #ffce00; font-size: 0.9em; }
        
        .filter-label { display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none; color: #aaa; }
        .filter-label input:checked + span { color: #fff; text-decoration: underline; }

        .details-row { background: #080808; border-bottom: 1px solid #444; }
        .details-table td { border: none; color: #888; font-size: 0.9em; padding: 3px 10px; }
        
        #analytics-container { height: 350px; width: 100%; background: #0a0a0a; border: 1px solid #333; margin-bottom: 20px; padding: 10px; box-sizing: border-box; }
        .verified-icon { color: #28a745; font-weight: bold; font-size: 1.1em; }

        /* --- MODALE INBOX --- */
        #msg-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 10000;
            display: flex; justify-content: center; align-items: center;
        }
        .msg-box {
            background: #111; border: 2px solid #fd7e14; padding: 20px; width: 600px;
            display: flex; flex-direction: column; gap: 15px; box-shadow: 0 0 20px rgba(253, 126, 20, 0.2);
        }
        .msg-box h2 { color: #fd7e14; margin: 0; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .msg-box label { color: #888; font-size: 0.9em; font-weight: bold; }
        .msg-box input, .msg-box textarea { width: 100%; box-sizing: border-box; }
        .msg-box textarea { height: 200px; resize: vertical; }
        
        /* Rendu Markdown Prévisualisation */
        .msg-preview {
            background: #000; border: 1px solid #555; height: 200px; padding: 15px;
            overflow-y: auto; color: #fff; box-sizing: border-box; font-family: sans-serif;
            border-left: 3px solid #ffce00;
        }
        .msg-preview h1 { color: #ffce00; font-size: 1.5em; margin-top: 0; }
        .msg-preview h2 { color: #ffce00; font-size: 1.3em; }
        .msg-preview h3 { color: #ffce00; font-size: 1.1em; }
        .msg-preview a { color: #fd7e14; text-decoration: none; }
        .msg-preview a:hover { text-decoration: underline; }

        .msg-actions { display: flex; justify-content: space-between; margin-top: 5px; }
        .msg-actions-right { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:#ffce00; margin-top:0;">ADMIN ACCESS</h2>
            <input type="password" id="admin-pass" placeholder="Password" style="margin-bottom:10px;">
            <br>
            <button onclick="login()" style="width:100%">ENTER</button>
        </div>
    </div>

    <div id="msg-modal" class="hidden">
        <div class="msg-box">
            <h2 id="msg-title">ENVOYER UN MESSAGE</h2>
            <input type="hidden" id="msg-uid">
            
            <div>
                <label>Objet du message :</label>
                <input type="text" id="msg-obj" placeholder="Ex: Bienvenue sur Brawl-Track !">
            </div>

            <div>
                <label>Date & Heure d'envoi (Optionnel) :</label><br>
                <input type="datetime-local" id="msg-date">
            </div>
            
            <div>
                <label>Contenu (Markdown : # Titre, **Gras**, *Italique*, [Texte](Lien)) :</label>
                <textarea id="msg-content" placeholder="Rédigez le message ici..."></textarea>
                <div id="msg-preview" class="hidden msg-preview"></div>
            </div>

            <div class="msg-actions">
                <button onclick="closeMsgModal()" class="btn-red">ANNULER</button>
                <div class="msg-actions-right">
                    <button onclick="togglePreview()" id="btn-preview" class="btn-blue">PRÉVISUALISER</button>
                    <button onclick="confirmSendMessage()" class="btn-green">ENVOYER</button>
                </div>
            </div>
        </div>
    </div>

    <div id="main-container">
        
        <header>
            <h1>Admin Panel <span style="font-size:0.5em; color:#666;">v4.1</span></h1>
            <div>
                <button onclick="loadData()">REFRESH</button>
                <button onclick="logout()" class="btn-red">LOGOUT</button>
            </div>
        </header>

        <div id="stats-area" class="stats-grid">Loading Stats...</div>

        <div class="controls">
            <div style="border-right: 1px solid #444; padding-right: 15px;">
                <button id="btn-analytics" onclick="setView('analytics')">ANALYTICS</button>
                <button id="btn-users" onclick="setView('users')" class="active">UTILISATEURS</button>
                <button id="btn-tags" onclick="setView('tags')">TAGS</button>
            </div>

            <div id="search-container">
                <input type="text" id="search" placeholder="Recherche..." onkeyup="renderView()" style="width: 150px;">
            </div>

            <div id="filters-users" style="display:flex; gap:15px; flex-wrap:wrap;">
                <label class="filter-label"><input type="checkbox" onchange="toggleFilter('premium')"> <span>Premium</span></label>
                <label class="filter-label"><input type="checkbox" onchange="toggleFilter('subscriber')"> <span>Abonnés</span></label>
                <label class="filter-label"><input type="checkbox" onchange="toggleFilter('basic')"> <span>Basics</span></label>
                <label class="filter-label"><input type="checkbox" onchange="toggleFilter('connected_today')"> <span>Connecté Aujourd'hui</span></label>
                <button id="btn-broadcast" onclick="openMsgModal('all', 'TOUS LES JOUEURS')" class="btn-orange" style="margin-left: 10px;">✉️ ENVOYER À TOUS</button>
            </div>

            <div id="filters-tags" class="hidden" style="display:flex; gap:15px;">
                <label class="filter-label"><input type="checkbox" onchange="toggleFilter('claimed')"> <span>Claimed</span></label>
                <label class="filter-label"><input type="checkbox" onchange="toggleFilter('unclaimed')"> <span>Unclaimed</span></label>
                <label class="filter-label"><input type="checkbox" onchange="toggleFilter('verified')"> <span>Vérifiés</span></label>
            </div>

            <div id="sort-container" style="margin-left:auto; display:flex; gap:5px;">
                <span>Tri:</span>
                <select id="sort-select" onchange="renderView()"></select>
                <button onclick="toggleSort()">▼</button>
            </div>
        </div>

        <div id="analytics-container" class="hidden">
            <canvas id="analyticsChart"></canvas>
        </div>

        <table id="data-table">
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
        </table>

    </div>

    <script src="js/config.js"></script>
    <script>
        // --- AUTH & INIT ---
        const ADMIN_KEY_KEY = 'admin_key_v3';
        let ADMIN_PASS = localStorage.getItem(ADMIN_KEY_KEY);
        let myChart = null; 

        if(ADMIN_PASS) {
            document.getElementById('login-overlay').classList.add('hidden');
            loadData();
        }

        async function login() {
            const p = document.getElementById('admin-pass').value;
            try {
                const res = await fetch(`${API_URL}/api/admin/login`, {
                    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({password:p})
                });
                if(res.ok) {
                    ADMIN_PASS = p;
                    localStorage.setItem(ADMIN_KEY_KEY, p);
                    document.getElementById('login-overlay').classList.add('hidden');
                    loadData();
                } else alert("INVALID PASSWORD");
            } catch(e) { alert("CONNECTION ERROR"); }
        }

        function logout() {
            localStorage.removeItem(ADMIN_KEY_KEY);
            location.reload();
        }

        // --- DATA ---
        let rawUsers = [], rawTags = [], rawAnalytics = [];
        let view = 'users'; 
        let filters = new Set();
        let sortDir = 1; 

        async function loadData() {
            if(!ADMIN_PASS) return;
            if(view !== 'analytics') document.getElementById('tbody').innerHTML = '<tr><td colspan="10" style="text-align:center">Loading data...</td></tr>';
            
            fetch(`${API_URL}/api/admin/stats`, {headers:{'X-Admin-Pass': ADMIN_PASS}})
                .then(r=>r.json()).then(renderStats).catch(e=>console.error(e));
            
            fetch(`${API_URL}/api/admin/analytics`, {headers:{'X-Admin-Pass': ADMIN_PASS}})
                .then(r=>r.json()).then(data => {
                    rawAnalytics = data.reverse(); 
                    if(view === 'analytics') renderView();
                });

            fetch(`${API_URL}/api/admin/users`, {headers:{'X-Admin-Pass': ADMIN_PASS}})
                .then(r=>r.json()).then(data => {
                    const map = new Map();
                    data.forEach(r => {
                        if(!map.has(r.id)) map.set(r.id, { ...r, tags: [] });
                        if(r.brawl_tag) map.get(r.id).tags.push({ 
                            id: r.tag_id, str: r.brawl_tag, interval: r.rec_temp, 
                            last: r.last_archive, total: r.total_archives || 0
                        });
                    });
                    rawUsers = Array.from(map.values());
                    if(view === 'users') renderView();
                });

            fetch(`${API_URL}/api/admin/tags`, {headers:{'X-Admin-Pass': ADMIN_PASS}})
                .then(r=>r.json()).then(data => {
                    rawTags = data;
                    if(view === 'tags') renderView();
                });
        }

        // --- LOGIQUE VUE & TRI ---
        function setView(v) {
            view = v;
            document.getElementById('btn-analytics').className = v==='analytics'?'active':'';
            document.getElementById('btn-users').className = v==='users'?'active':'';
            document.getElementById('btn-tags').className = v==='tags'?'active':'';
            
            document.getElementById('filters-users').className = v==='users'?'':'hidden';
            document.getElementById('filters-tags').className = v==='tags'?'':'hidden';
            document.getElementById('search-container').className = v==='analytics'?'hidden':'';
            document.getElementById('sort-container').className = v==='analytics'?'hidden':'';
            
            document.getElementById('analytics-container').className = v==='analytics'?'':'hidden';
            document.getElementById('data-table').className = v==='analytics'?'hidden':'';

            filters.clear();
            document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);
            
            const sel = document.getElementById('sort-select');
            sel.innerHTML = '';
            if(v === 'users') {
                sel.innerHTML += '<option value="id">ID</option>';
                sel.innerHTML += '<option value="name">Nom (Alpha)</option>';
                sel.innerHTML += '<option value="last_login">Dernière Connexion</option>';
                sel.innerHTML += '<option value="coins">Track-Coins</option>';
            } else if(v === 'tags') {
                sel.innerHTML += '<option value="id">ID (Tag)</option>';
                sel.innerHTML += '<option value="owner">Nom Propriétaire</option>';
                sel.innerHTML += '<option value="next_archive">Prochaine Archive</option>';
                sel.innerHTML += '<option value="last_archive">Dernière Archive</option>';
                sel.innerHTML += '<option value="trophies">Nombre de Trophées</option>';
            }
            renderView();
        }

        function toggleFilter(f) {
            if(filters.has(f)) filters.delete(f); else filters.add(f);
            renderView();
        }
        function toggleSort() { sortDir *= -1; renderView(); }

        // --- PROCESSING CORE ---
        function getProcessedData() {
            let data = [];
            const search = document.getElementById('search').value.toLowerCase();
            const now = new Date();

            if(view === 'users') {
                data = rawUsers.map(u => ({...u}));
                if(search) data = data.filter(u => u.username.toLowerCase().includes(search) || u.id.toString().includes(search));
                
                const typeFilters = ['premium', 'subscriber', 'basic'];
                const hasTypeFilter = typeFilters.some(f => filters.has(f));
                if(hasTypeFilter) {
                    data = data.filter(u => {
                        if(filters.has('premium') && u.tier === 'premium') return true;
                        if(filters.has('subscriber') && u.tier === 'subscriber') return true;
                        if(filters.has('basic') && u.tier === 'basic') return true;
                        return false;
                    });
                }
                if(filters.has('connected_today')) data = data.filter(u => u.last_login && (now - new Date(u.last_login) < 86400000));

                const crit = document.getElementById('sort-select').value;
                data.sort((a,b) => {
                    let vA, vB;
                    if(crit === 'id') { vA = a.id; vB = b.id; }
                    else if(crit === 'name') { vA = a.username.toLowerCase(); vB = b.username.toLowerCase(); }
                    else if(crit === 'last_login') { vA = a.last_login || ''; vB = b.last_login || ''; }
                    else if(crit === 'coins') { vA = a.track_coins || 0; vB = b.track_coins || 0; }
                    
                    if(vA < vB) return -1 * sortDir;
                    if(vA > vB) return 1 * sortDir;
                    return 0;
                });
            } else if(view === 'tags') {
                data = rawTags.map(t => ({...t}));
                if(search) data = data.filter(t => t.tag_str.toLowerCase().includes(search) || (t.owner_name && t.owner_name.toLowerCase().includes(search)));
                if(filters.has('claimed')) data = data.filter(t => t.claimer_id);
                if(filters.has('unclaimed')) data = data.filter(t => !t.claimer_id);
                if(filters.has('verified')) data = data.filter(t => t.is_verified);

                const crit = document.getElementById('sort-select').value;
                data.sort((a,b) => {
                    let vA, vB;
                    if(crit === 'id') { vA = a.tag_str; vB = b.tag_str; }
                    else if(crit === 'owner') { vA = a.owner_name ? a.owner_name.toLowerCase() : 'zzzz'; vB = b.owner_name ? b.owner_name.toLowerCase() : 'zzzz'; }
                    else if(crit === 'last_archive') { vA = a.last_archive || ''; vB = b.last_archive || ''; }
                    else if(crit === 'trophies') { vA = a.current_trophies || 0; vB = b.current_trophies || 0; }
                    else if(crit === 'next_archive') {
                        const getNext = (t) => t.last_archive ? new Date(t.last_archive.replace(' ', 'T')).getTime() + (t.rec_temp*60000) : 0;
                        vA = getNext(a); vB = getNext(b);
                    }
                    if(vA < vB) return -1 * sortDir;
                    if(vA > vB) return 1 * sortDir;
                    return 0;
                });
            }
            return data;
        }

        // --- RENDER ---
        function renderView() {
            if(view === 'analytics') {
                renderAnalyticsChart();
                return;
            }

            const tbody = document.getElementById('tbody');
            const thead = document.getElementById('thead');
            tbody.innerHTML = '';
            
            const data = getProcessedData();

            if(view === 'users') {
                thead.innerHTML = `<tr><th>+</th><th>ID</th><th>NOM</th><th>GRADE</th><th>COINS</th><th>LIENS</th><th>CONNEXION</th><th>TAG LIÉ</th><th>ACTIONS</th></tr>`;
                
                data.forEach(u => {
                    const row = document.createElement('tr');
                    const primaryTag = u.tags.length > 0 ? `<span class="badge">${u.tags[0].str}</span>` : '<span style="color:#555">Aucun</span>';
                    
                    const discordColor = u.discord_confirmed ? '#7289da' : '#333';
                    const emailColor = u.email_confirmed ? '#28a745' : '#333';
                    const linksHTML = `<span style="color:${discordColor}; font-size:1.2em" title="Discord">💬</span> <span style="color:${emailColor}; font-size:1.2em" title="Email">📧</span>`;
                    
                    row.innerHTML = `
                        <td><button style="padding:0 5px" onclick="toggleDetails(${u.id})">▼</button></td>
                        <td>${u.id}</td>
                        <td style="font-weight:bold; color:#fff">${u.username}</td>
                        <td>
                            <select onchange="updateTier(${u.id}, this.value)" style="padding:0;">
                                <option value="basic" ${u.tier==='basic'?'selected':''}>Basic</option>
                                <option value="subscriber" ${u.tier==='subscriber'?'selected':''}>Subscriber</option>
                                <option value="premium" ${u.tier==='premium'?'selected':''}>Premium</option>
                            </select>
                        </td>
                        <td style="color:#ffce00; font-weight:bold;">${u.track_coins || 0}</td>
                        <td>${linksHTML}</td>
                        <td>${u.last_login || '-'}</td>
                        <td>${primaryTag}</td>
                        <td>
                            <button onclick="manageCoins(${u.id})" class="btn-blue" title="Gérer Track-Coins">💰</button>
                            <button onclick="openMsgModal(${u.id}, '${u.username}')" class="btn-orange" title="Envoyer Message">✉️</button>
                            <button onclick="addTag(${u.id})" class="btn-green" title="Force Claim Tag">+</button>
                            <button onclick="renameUser(${u.id}, '${u.username}')" title="Renommer">R</button>
                            <button onclick="deleteUser(${u.id})" class="btn-red" title="Supprimer">X</button>
                        </td>
                    `;
                    tbody.appendChild(row);

                    if(u.tags.length > 0) {
                        const dr = document.createElement('tr');
                        dr.id = `d-${u.id}`;
                        dr.className = 'hidden details-row';
                        let h = '<td colspan="9"><table class="details-table" style="width:90%; margin:auto;">';
                        u.tags.forEach(t => {
                            h += `<tr>
                                <td style="width:20px;">↳</td>
                                <td class="badge">${t.str}</td>
                                <td>Freq: <input type="number" value="${t.interval}" style="width:40px; text-align:center" onchange="updFreq(${t.id}, this)">m</td>
                                <td>Last: ${t.last || 'Never'}</td>
                                <td>Arch: ${t.total}</td>
                                <td><button onclick="window.location.href='admin_edit.html?tag_id=${t.id}'" class="btn-blue">EDIT</button></td>
                                <td style="text-align:right"><button onclick="unclaim(${t.id})" class="btn-orange">UNCLAIM</button></td>
                            </tr>`;
                        });
                        h += '</table></td>';
                        dr.innerHTML = h;
                        tbody.appendChild(dr);
                    }
                });
            } else if (view === 'tags') {
                thead.innerHTML = `<tr><th>PROPRIÉTAIRE</th><th>TAG</th><th>FREQ</th><th>LAST ARCH.</th><th>NEXT ARCH.</th><th>TROPHÉES</th><th>ARCHIVES</th><th>ACTIONS</th></tr>`;
                data.forEach(t => {
                    const row = document.createElement('tr');
                    const owner = t.owner_name ? `<span style="color:#fff; font-weight:bold">${t.owner_name}</span>` : '<span style="color:#555">-- UNCLAIMED --</span>';
                    const verifiedIcon = t.is_verified ? '<span class="verified-icon" title="Compte Vérifié In-Game">✔️</span>' : '';
                    
                    let nextStr = '-';
                    if(t.last_archive) {
                        const d = new Date(t.last_archive.replace(' ', 'T')).getTime();
                        const n = d + (t.rec_temp * 60000);
                        const diff = Math.ceil((n - Date.now()) / 60000);
                        nextStr = diff > 0 ? diff + ' min' : 'Maintenant';
                    }

                    row.innerHTML = `
                        <td>${owner}</td>
                        <td class="badge">${t.tag_str} ${verifiedIcon}</td>
                        <td><input type="number" value="${t.rec_temp}" style="width:50px" onchange="updFreq(${t.id}, this)"></td>
                        <td>${t.last_archive || '-'}</td>
                        <td>${nextStr}</td>
                        <td style="color:#ffce00">${t.current_trophies || 0}</td>
                        <td>${t.total_archives}</td>
                        <td>
                            ${t.claimer_id ? `<button onclick="unclaim(${t.id})" class="btn-orange">UNCLAIM</button>` : ''}
                            <button onclick="window.location.href='admin_edit.html?tag_id=${t.id}'" class="btn-blue">EDIT</button>
                            <button onclick="delTag(${t.id})" class="btn-red">DEL</button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            }
        }

        function renderAnalyticsChart() {
            if(!rawAnalytics || rawAnalytics.length === 0) return;
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            if(myChart) myChart.destroy();
            
            const labels = rawAnalytics.map(d => {
                const parts = d.date.split('-'); 
                return `${parts[2]}/${parts[1]}`;
            });
            
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { label: 'Visites', data: rawAnalytics.map(d => d.visits), borderColor: '#007bff', backgroundColor: 'transparent', tension: 0.3 },
                        { label: 'Uniques', data: rawAnalytics.map(d => d.unique_visitors), borderColor: '#28a745', backgroundColor: 'transparent', tension: 0.3 },
                        { label: 'Logins', data: rawAnalytics.map(d => d.logins), borderColor: '#ffce00', backgroundColor: 'transparent', tension: 0.3 },
                        { label: 'Images Générées', data: rawAnalytics.map(d => d.img_generations), borderColor: '#fd7e14', backgroundColor: 'transparent', tension: 0.3 }
                    ]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false, color: '#ccc',
                    scales: { y: { beginAtZero: true, grid: { color: '#333' } }, x: { grid: { color: '#333' } } },
                    plugins: { legend: { labels: { color: '#fff' } } }
                }
            });
        }

        function renderStats(d) {
            const h = document.getElementById('stats-area');
            h.innerHTML = `
                <div class="stat-box"><h3>USERS</h3><p>${d.users}</p></div>
                <div class="stat-box"><h3>ARCHIVE G/B</h3><p>${d.records_global} / ${d.records_brawlers}</p></div>
                <div class="stat-box"><h3>TAGS (C/T)</h3><p>${d.claimed_tags}/${d.total_tags}</p></div>
                <div class="stat-box"><h3>STORAGE</h3><p>${d.disk_str}</p></div>
                <div class="stat-box"><h3>LAST ARCH.</h3><p style="font-size:0.9em">${d.last_archive_date||'-'}</p></div>
                <div class="stat-box"><h3>NEXT ARCH.</h3><p style="color:#28a745; font-size:0.9em">${d.next_archive_date||'-'}</p></div>
                <div class="stat-box"><h3>CPU</h3><p>${d.cpu}%</p></div>
                <div class="stat-box"><h3>RAM</h3><p>${d.ram}%</p></div>
            `;
        }
        
        // --- LOGIQUE INBOX & MODALE ---
        function parseMarkdown(text) {
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^# (.*$)/gim, '<h1>$1</h1>')
                .replace(/\*\*(.*)\*\*/gim, '<b>$1</b>')
                .replace(/\*(.*)\*/gim, '<i>$1</i>')
                .replace(/\[(.*?)\]\((.*?)\)/gim, "<a href='$2' target='_blank'>$1</a>")
                .replace(/\n/gim, '<br>');
        }

        function openMsgModal(uid, username) {
            document.getElementById('msg-uid').value = uid;
            document.getElementById('msg-title').innerText = uid === 'all' ? "MESSAGE À TOUS LES JOUEURS" : `MESSAGE À ${username.toUpperCase()}`;
            document.getElementById('msg-obj').value = '';
            document.getElementById('msg-content').value = '';
            
            // Format de la date (heure locale actuelle)
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('msg-date').value = now.toISOString().slice(0,16);

            document.getElementById('msg-content').classList.remove('hidden');
            document.getElementById('msg-preview').classList.add('hidden');
            document.getElementById('btn-preview').innerText = 'PRÉVISUALISER';
            
            document.getElementById('msg-modal').classList.remove('hidden');
        }

        function closeMsgModal() {
            document.getElementById('msg-modal').classList.add('hidden');
        }

        function togglePreview() {
            const content = document.getElementById('msg-content');
            const preview = document.getElementById('msg-preview');
            const btn = document.getElementById('btn-preview');

            if(content.classList.contains('hidden')) {
                // Retour au mode Édition
                content.classList.remove('hidden');
                preview.classList.add('hidden');
                btn.innerText = 'PRÉVISUALISER';
            } else {
                // Mode Prévisualisation Markdown
                preview.innerHTML = parseMarkdown(content.value);
                content.classList.add('hidden');
                preview.classList.remove('hidden');
                btn.innerText = 'ÉDITER';
            }
        }

        function confirmSendMessage() {
            const uid = document.getElementById('msg-uid').value;
            const obj = document.getElementById('msg-obj').value;
            const content = document.getElementById('msg-content').value;
            const inputDate = document.getElementById('msg-date').value;

            if(!obj || !content) { alert("Objet et contenu requis !"); return; }
            
            let dateEnvoiUtc = null;
            
            // Si l'admin a entré une date, on la convertit en UTC avant de l'envoyer au serveur
            if(inputDate) {
                const localDate = new Date(inputDate);
                // toISOString() renvoie "YYYY-MM-DDTHH:mm:ss.sssZ" qui est toujours en UTC
                dateEnvoiUtc = localDate.toISOString().slice(0, 19).replace('T', ' ');
            }

            api(`messages/send`, 'POST', {user_id: uid, objet: obj, contenu: content, date_envoi: dateEnvoiUtc}).then(ok => {
                if(ok) {
                    alert("Message programmé / envoyé avec succès !");
                    closeMsgModal();
                }
            });
        }

        // --- AUTRES ACTIONS ---
        function toggleDetails(id) { const r=document.getElementById('d-'+id); if(r) r.classList.toggle('hidden'); }
        
        async function api(url, method='POST', body={}) {
            const res = await fetch(`${API_URL}/api/admin/${url}`, {
                method: method, headers:{'Content-Type':'application/json', 'X-Admin-Pass':ADMIN_PASS}, body:JSON.stringify(body)
            });
            if(res.ok) { loadData(); return true; }
            else { alert("ERROR"); return false; }
        }

        function renameUser(id, old) { const n=prompt("Name:", old); if(n && n!==old) api(`user/${id}/rename`, 'POST', {username:n}); }
        function addTag(id) { const t=prompt("Tag (#...):"); if(t) api(`user/${id}/claim`, 'POST', {tag:t}); }
        
        function manageCoins(uid) {
            const val = prompt("Modifier les Track-Coins :\n(+100 pour ajouter, -50 pour retirer)");
            const amt = parseInt(val, 10);
            if(!isNaN(amt)) api(`user/${uid}/coins`, 'POST', {amount: amt});
        }

        function deleteUser(id) { 
            if(confirm("⚠ SUPPRIMER DEFINITIVEMENT CET UTILISATEUR ?\n(Ses tags deviendront orphelins)")) {
                api(`user/${id}/delete`, 'DELETE'); 
            }
        } 
        
        function unclaim(tid) { 
            if(confirm("Unclaim Tag ?")) api(`tag/${tid}/unclaim`); 
        }
        
        function delTag(tid) { 
            if(confirm("⚠ SUPPRIMER CE TAG ET TOUT SON HISTORIQUE ?\nCette action est irréversible.")) {
                fetch(`${API_URL}/api/admin/tag/${tid}`, {method:'DELETE', headers:{'X-Admin-Pass':ADMIN_PASS}}).then(loadData); 
            }
        }
        
        function updateTier(uid, tier) { api(`update-tier`, 'POST', {user_id:uid, tier:tier}); }
        function updFreq(tid, el) {
            api(`tag/${tid}/frequency`, 'POST', { minutes: parseInt(el.value, 10) })
                .then(ok => {
                    el.style.borderColor = ok ? '#28a745' : '#ff5555';
                    el.title = ok ? 'Fréquence mise à jour' : 'Erreur de mise à jour';
                })
                .catch(() => {
                    el.style.borderColor = '#ff5555';
                    el.title = 'Erreur réseau';
                });
        }

        // Init view
        setView('users');
    </script>
</body>
</html>
